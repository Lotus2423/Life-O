version: "3.9"

services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: twinforge
      POSTGRES_PASSWORD: twinforge
      POSTGRES_DB: twinforge